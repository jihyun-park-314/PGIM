model: sasrec
backbone_mode: trained_sasrec
top_k: 100
fallback:
  policy: popularity
  min_sequence_length: 2
model_dim: 128
num_blocks: 2
num_heads: 2
dropout: 0.2
max_seq_len: 50
batch_size: 256
num_epochs: 100
learning_rate: 0.001
early_stopping_patience: 10
split_mode: leave_one_out
eval_ndcg_k: 10
eval_every_n_epochs: 1
full_eval_every_n_epochs: 1
save_every_epoch: true
save_optimizer_state: false
eval_max_users: null
full_eval_max_users: null
use_trained_model: true
checkpoint_path: data/checkpoints/amazon_movies_tv/sasrec_best.pt
