# ── Deviation reason thresholds ──────────────────────────────────
deviation:
  aligned_overlap_threshold: 0.4
  exploration_entropy_threshold: 0.6
  task_focus_dominance_threshold: 0.5
  budget_shift_min_persona_support: 2

# ── Confidence defaults by source ────────────────────────────────
confidence:
  aligned: 0.75
  exploration: 0.55
  task_focus: 0.65
  budget_shift: 0.60
  unknown: 0.35
  llm_base: 0.80

# ── TTL (in recommendation steps) ────────────────────────────────
ttl:
  aligned: 3
  exploration: 1
  task_focus: 2
  budget_shift: 2
  unknown: 1

# ── Context feature extraction ───────────────────────────────────
context:
  top_goal_concepts: 5
  # Movies_and_TV: category (genre/sub-genre) is most discriminative.
  # category added as primary signal; format and price_band as auxiliary.
  # brand excluded from signal_types (too specific, gt_match_rate=0.006).
  signal_concept_types:
    - category
    - format
    - price_band

  # goal_concepts priority: lower number = higher priority in top-N selection.
  # category first, then price_band/format, brand never.
  goal_concept_priority:
    category: 0
    price_band: 1
    format: 2

# ── Cache policy ─────────────────────────────────────────────────
cache:
  default_interpreter: heuristic

# ── LLM (optional) ───────────────────────────────────────────────
# Activated at runtime via --use-llm flag (overrides use_llm below).
# use_llm: false keeps heuristic as default for full-dataset builds.
llm:
  use_llm: false          # set true or pass --use-llm to activate
  model: gpt-4o           # A/B test: 4o vs mini
  timeout_seconds: 10
  max_retries: 2
  # max_concepts_in_prompt: cap on candidate concepts shown to LLM (token budget)
  max_concepts_in_prompt: 40
